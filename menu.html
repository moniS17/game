<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>if(!localStorage.getItem("battlegrid.user"))location.replace("login.html");</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Battlegrid — Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1b2735 0%, #090a0f 100%); color: #e6e6e6;
    }
    .menu {
      background: #23282e; padding: 2.5rem 2rem; border-radius: 14px; width: 100%;
      max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,.5); text-align: center;
    }
    @media (min-width: 600px) {
      .menu { max-width: 520px; }
      .btn-row { display: flex; gap: .9rem; }
      .btn-row button { flex: 1; }
    }
    @media (max-width: 360px) {
      .menu { padding: 1.5rem 1rem; }
      h1 { font-size: 1.4rem; }
      button { padding: .7rem; font-size: .88rem; }
    }
    h1 { font-size: 1.8rem; margin-bottom: .3rem; }
    .sub { color: #9aa4ad; font-size: .85rem; margin-bottom: 1.8rem; }
    .greeting { color: #7cb342; font-size: .85rem; margin-bottom: 1.4rem; }
    button {
      width: 100%; padding: 1rem; margin-bottom: .9rem; font-size: 1rem; font-weight: 600;
      color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: transform .1s, background .2s;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    .new { background: #3a5bd9; } .new:hover { background: #2f49b0; }
    .cont { background: #2e7d46; } .cont:hover { background: #266b3b; }
    button:disabled { background: #3a3f45; color: #6b727a; cursor: not-allowed; }
    .hint { font-size: .72rem; color: #6b727a; margin-top: 1rem; }
    .lang-btn {
      position: fixed; top: 16px; right: 16px;
      padding: 6px 14px; font-size: .85rem; font-weight: 600;
      background: rgba(255,255,255,.12); color: #e6e6e6; border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px; cursor: pointer; transition: background .2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,.22); }
  </style>
</head>
<body>
  <button class="lang-btn" id="langBtn">中文</button>
  <div class="menu">
    <div class="greeting" id="greeting"></div>
    <div class="btn-row">
      <button class="new"  id="newBtn">🗺️ Start new map</button>
      <button class="cont" id="contBtn">▶️ Continue</button>
    </div>
  </div>

  <script src="state.js"></script>
  <script>
    const user = localStorage.getItem("battlegrid.user") || "player";
    document.getElementById("greeting").textContent = "hello: " + user;

    const contBtn = document.getElementById("contBtn");
    const save = SaveState.load();
    const hasEnded = save && save.winner !== undefined && save.winner !== null;
    contBtn.disabled = !SaveState.exists();
    if (hasEnded) {
      contBtn.innerHTML = "🏁 Last game ended";
      contBtn.disabled = true;
    }

    // New map: go pick the opponent, board size and Creative mode.
    document.getElementById("newBtn").addEventListener("click", () => {
      window.location.href = "mode.html";
    });
    // Continue resumes the saved game in whatever mode it was started in.
    contBtn.addEventListener("click", () => {
      if (contBtn.disabled) return;
      SaveState.setIntent({ action: "continue" });
      window.location.href = "index.html";
    });

    // Language toggle
    const menuI18n = {
      en: { hello: 'hello: ', newMap: '🗺️ Start new map', cont: '▶️ Continue', ended: '🏁 Last game ended', langLabel: '中文' },
      zh: { hello: '你好: ', newMap: '🗺️ 开始新地图', cont: '▶️ 继续游戏', ended: '🏁 上局已结束', langLabel: 'EN' }
    };
    function getLang() { return localStorage.getItem('battlegrid.lang') || 'en'; }
    function setMenuLang(lang) {
      localStorage.setItem('battlegrid.lang', lang);
      applyMenuLang(lang);
    }
    function applyMenuLang(lang) {
      const t = menuI18n[lang] || menuI18n.en;
      document.getElementById('greeting').textContent = t.hello + user;
      document.getElementById('newBtn').textContent = t.newMap;
      if (!hasEnded) contBtn.textContent = t.cont;
      else contBtn.innerHTML = t.ended;
      document.getElementById('langBtn').textContent = t.langLabel;
    }
    document.getElementById('langBtn').addEventListener('click', () => {
      setMenuLang(getLang() === 'en' ? 'zh' : 'en');
    });
    applyMenuLang(getLang());
  </script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
</body>
</html>
