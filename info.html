<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Battlegrid — Field Manual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; background: #1b1f23; color: #e6e6e6; padding: 24px;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: .2rem; }
    .sub { color: #9aa4ad; font-size: .85rem; margin-bottom: 1.4rem; }
    h2 { font-size: .9rem; text-transform: uppercase; letter-spacing: .05em; color: #9aa4ad; margin: 22px 0 8px; }
    .panel { background: #23282e; border-radius: 10px; padding: 14px 16px; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th, td { text-align: center; padding: 6px 6px; border-bottom: 1px solid #333; }
    th:first-child, td:first-child { text-align: left; }
    th { color: #9aa4ad; font-weight: 600; }
    td .name { display: flex; align-items: center; gap: 9px; }
    .swatch { width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0; }
    .icon { width: 22px; height: 22px; border-radius: 5px; background: #1b1f23; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: .8rem; }
    .buff { color: #7cb342; font-weight: 700; }
    .debuff { color: #ef6a5a; font-weight: 700; }
    .neutral { color: #9aa4ad; }
    ul { margin: 4px 0 0 18px; font-size: .85rem; line-height: 1.7; }
    ul b { color: #fff; }
    .tag { display: inline-block; font-size: .7rem; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
    .tag.buff { background: rgba(124,179,66,.18); }
    .tag.debuff { background: rgba(239,106,90,.18); }
    .bar { margin: 24px 0 0; display: flex; gap: 12px; }
    .bar a { flex: 1; text-align: center; padding: .8rem; border-radius: 8px; text-decoration: none; font-weight: 600; color: #fff; }
    .bar a.battle { background: #3a5bd9; } .bar a.menu { background: #444c55; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📖 Field Manual</h1>
    <div class="sub">Buffs, debuffs and rules for terrain, units and combat.</div>

    <h2>Terrain effects</h2>
    <div class="panel">
      <table id="terrainTable">
        <tr><th>Tile</th><th>Move cost</th><th>Defense</th><th>Effect</th></tr>
      </table>
      <ul id="terrainNotes"></ul>
    </div>

    <h2>Units</h2>
    <div class="panel">
      <table id="unitTable">
        <tr><th>Unit</th><th>HP</th><th>ATK</th><th>MOV</th><th>Cost</th><th>Role</th></tr>
      </table>
    </div>

    <h2>Combat &amp; stacking</h2>
    <div class="panel">
      <ul id="combatRules"></ul>
    </div>

    <h2>Economy &amp; upgrades</h2>
    <div class="panel">
      <ul id="econRules"></ul>
    </div>

    <div class="bar">
      <a class="battle" href="index.html">⬅ Return to battle</a>
      <a class="menu" href="menu.html">Main menu</a>
    </div>
  </div>

  <!-- data + rules only (no engine) -->
  <script src="algorithms.js"></script>
  <script src="board.js"></script>
  <script src="units.js"></script>
  <script src="rules.js"></script>
  <script>
    const arts = { city: 'assets/city.svg', forest: 'assets/forest.svg', water: 'assets/water.svg', plains: 'assets/grass.svg' };

    // --- Terrain table ---
    const tt = document.getElementById("terrainTable");
    for (const k in TERRAIN) {
      const t = TERRAIN[k];
      const move = t.move_cost > 1
        ? `<span class="debuff">${t.move_cost}</span>` : `<span class="neutral">${t.move_cost}</span>`;
      const def = t.defense > 0
        ? `<span class="buff">+${t.defense}</span>` : `<span class="neutral">0</span>`;
      let effect = [];
      if (t.defense > 0) effect.push(`<span class="tag buff">+${t.defense} defense (cover)</span>`);
      if (t.move_cost > 1) effect.push(`<span class="tag debuff">slower to enter</span>`);
      if (!effect.length) effect.push(`<span class="neutral">—</span>`);
      const visual = arts[k]
        ? `<img class="swatch" src="${arts[k]}" alt="">` : `<span class="swatch" style="background:${t.color}"></span>`;
      const tr = document.createElement("tr");
      tr.innerHTML =
        `<td><span class="name">${visual}${t.name} (${t.code})</span></td>` +
        `<td>${move}</td><td>${def}</td><td>${effect.join(" ")}</td>`;
      tt.appendChild(tr);
    }
    document.getElementById("terrainNotes").innerHTML =
      `<li><b>Defense</b> is subtracted from incoming attack damage on that tile (minimum 1 damage).</li>` +
      `<li><b>Water</b> costs ${TERRAIN.water.move_cost} to enter, and <b>two water tiles in a row are impassable</b> — 1-wide rivers can be crossed (land → water → land), 2-wide stretches cannot.</li>` +
      `<li>Attacking while you <b>or</b> your target stands on water suffers a <span class="debuff">−${Rules.COMBAT.river_attack_penalty}</span> river penalty.</li>` +
      `<li><b>Cities</b> give the strongest cover and can be <b>captured</b> by moving onto them; each owned city adds income.</li>`;

    // --- Units table ---
    const ut = document.getElementById("unitTable");
    const roles = {
      pawn: "Cheap frontline body; stack them deep.",
      archer: "Cheap ranged-value attacker.",
      cavalry: "Fast flanker, hard hitter.",
      artillery: "Glass cannon: huge ATK, crawls.",
      cannon: "Siege gun: heavy, slow, tanky-ish.",
      tank: "Heavy: high HP + ATK, priciest.",
    };
    for (const k in PIECES) {
      const d = PIECES[k];
      const visual = d.art ? `<img class="swatch" src="${d.art}" alt="">` : `<span class="icon">${d.code}</span>`;
      const tr = document.createElement("tr");
      tr.innerHTML =
        `<td><span class="name">${visual}${d.name} (${d.code})</span></td>` +
        `<td>${d.hp}</td><td>${d.attack}</td><td>${d.movement_speed}</td><td>$${d.cost}</td>` +
        `<td style="text-align:left; color:#c5ccd3">${roles[k] || ""}</td>`;
      ut.appendChild(tr);
    }

    // --- Combat & stacking rules ---
    document.getElementById("combatRules").innerHTML =
      `<li>Up to <b>${Rules.STACK_LIMIT} units</b> of one side may <b>stack</b> on a single tile (shown as a letter + count, e.g. p₃).</li>` +
      `<li>Attacks hit <b>adjacent</b> tiles only (up/down/left/right).</li>` +
      `<li>Combat is <b>mutual</b>: attacker and defender each deal the <b>sum of their units' ATK</b> (minus the other tile's terrain defense), spread through the stack 1 unit at a time.</li>` +
      `<li class="buff">If one side has at least <b>twice</b> the other's unit count, the outnumbered side takes <b>double damage</b> — numbers win regardless of unit quality.</li>` +
      `<li>Attacking <b>halves</b> the attacker's remaining movement (rounded down) instead of ending its turn, so a high-MOV unit can still move after striking.</li>` +
      `<li>Deploy bought units anywhere in your own <b>17-column zone</b> (Blue = left, Red = right).</li>`;

    // --- Economy & upgrades ---
    document.getElementById("econRules").innerHTML =
      `<li>Each player starts with <b>${ECONOMY.start}</b> gold.</li>` +
      `<li>Income per round = <b>${ECONOMY.base_income}</b> base + <b>${ECONOMY.city_income}</b> per owned city.</li>` +
      `<li><b>Upgrades</b> (Attack +${UPGRADES.atk.gain}, Health +${UPGRADES.hp.gain}, Movement +${UPGRADES.mov.gain}) cost gold, ` +
        `strengthen your own units of a type, and apply only to the <b>current game</b>.</li>`;
  </script>
</body>
</html>
