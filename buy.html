<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Battlegrid — Shop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; background: #1b1f23; color: #e6e6e6; padding: 24px;
    }
    header { display: flex; align-items: center; justify-content: space-between; max-width: 900px; margin: 0 auto 20px; }
    h1 { font-size: 1.4rem; }
    .gold { font-size: 1.1rem; font-weight: 700; color: #f5c542; }
    .who { font-size: .85rem; color: #9aa4ad; }
    .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #2b3138; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .card .top { display: flex; align-items: center; gap: 12px; }
    /* mini template preview (5x5) */
    .mini { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; width: 60px; flex: 0 0 auto; }
    .mini i { aspect-ratio: 1/1; border-radius: 2px; background: #14171b; }
    .card h3 { font-size: 1rem; }
    .stats { font-size: .82rem; color: #c5ccd3; line-height: 1.6; }
    .stats b { color: #fff; }
    .cost { font-weight: 700; color: #f5c542; }
    button.buy { padding: .6rem; border: none; border-radius: 6px; background: #2e7d46; color: #fff; font-weight: 600; cursor: pointer; }
    button.buy:hover:not(:disabled) { background: #266b3b; }
    button.buy:disabled { background: #3a3f45; color: #6b727a; cursor: not-allowed; }
    .stepper { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 6px; }
    .stepper button {
      width: 34px; height: 32px; flex: 0 0 auto; border: none; border-radius: 6px;
      background: #3a5bd9; color: #fff; font-size: .95rem; font-weight: 700; cursor: pointer; line-height: 1;
    }
    .stepper button:hover { background: #2f49b0; }
    .stepper .qty { flex: 0 0 40px; text-align: center; font-weight: 700; font-size: 1rem; }
    .bar { max-width: 900px; margin: 22px auto 0; display: flex; gap: 12px; }
    .bar a { flex: 1; text-align: center; padding: .8rem; border-radius: 8px; text-decoration: none; font-weight: 600; color: #fff; background: #3a5bd9; }
    .queue { max-width: 900px; margin: 18px auto 0; font-size: .85rem; color: #9aa4ad; }
    .queue b { color: #7cb342; }
    .empty { max-width: 900px; margin: 0 auto; color: #7e8893; font-size: .9rem; }
    .empty a { color: #8ea2ff; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🛒 Unit Shop</h1>
      <div class="who" id="who"></div>
    </div>
    <div class="gold"><img src="assets/gold.svg" alt="gold" style="width:1.15em;height:1.15em;vertical-align:-0.2em"> <span id="gold">0</span> gold</div>
  </header>

  <div class="grid" id="grid"></div>
  <div id="noTemplates" class="empty" style="display:none">
    No buildable templates yet — design one in the <a href="template.html">Regiment designer</a>.
  </div>
  <div class="queue" id="queue"></div>

  <div class="bar">
    <a href="index.html">⬅ Return to battle</a>
    <a href="template.html" style="background:#6a4bd9">▦ Templates</a>
    <a href="tech.html" style="background:#6a4bd9">⚗️ Tech tree</a>
  </div>

  <script src="units.js"></script>
  <script src="state.js"></script>
  <script>
    const save = SaveState.load();
    if (!save) { window.location.href = "menu.html"; }

    const buyer = save.turn;                 // the player whose turn it is shops
    save.pendingSpawns = save.pendingSpawns || [];
    save.unlocked = save.unlocked || [{ infantry: true }, { infantry: true }];
    save.unlocked[buyer] = save.unlocked[buyer] || {}; save.unlocked[buyer].infantry = true;
    save.upgrades = save.upgrades || [{}, {}];
    save.templates = save.templates || [[], []];
    save.templates[buyer] = save.templates[buyer] || [];

    const isUnlocked = (t) => t === "infantry" || !!save.unlocked[buyer][t];
    const steps = (t, s) => (save.upgrades[buyer] && save.upgrades[buyer][t] && save.upgrades[buyer][t][s]) || 0;
    const eff = (t) => ({
      atk: PIECES[t].attack + steps(t, "atk") * UPGRADES.atk.gain,
      hp: PIECES[t].hp + steps(t, "hp") * UPGRADES.hp.gain,
      mov: PIECES[t].movement_speed + steps(t, "mov") * UPGRADES.mov.gain,
    });
    // Aggregate a battalion's cost / stats, and whether every unit is unlocked.
    function statsOf(tmpl) {
      let cost = 0, hp = 0, atk = 0, mov = Infinity, n = 0, ok = true;
      for (const t of (tmpl.cells || [])) {
        if (!t) continue; n++; const e = eff(t);
        cost += PIECES[t].cost; hp += e.hp; atk += e.atk; mov = Math.min(mov, e.mov);
        if (!isUnlocked(t)) ok = false;
      }
      return { cost, hp, atk, mov: isFinite(mov) ? mov : 0, n, ok };
    }
    const templateById = (id) => save.templates[buyer].find((t) => t.id === id);

    document.getElementById("who").textContent =
      PLAYERS[buyer].name + "'s turn — buy regiments built from your templates; deploy at your home edge.";

    const goldEl = document.getElementById("gold");
    const queueEl = document.getElementById("queue");
    const grid = document.getElementById("grid");
    const qty = {};
    for (const t of save.templates[buyer]) qty[t.id] = 1;

    function refresh() {
      goldEl.textContent = save.economy[buyer];
      const gold = save.economy[buyer];
      document.querySelectorAll(".card").forEach((card) => {
        const tmpl = templateById(card.dataset.id);
        const s = statsOf(tmpl);
        card.querySelector(".qty").textContent = qty[tmpl.id];
        const total = s.cost * qty[tmpl.id];
        const btn = card.querySelector("button.buy");
        const buyable = s.n > 0 && s.ok;
        btn.innerHTML = !s.n ? "Empty template" : !s.ok ? "Needs research" : `Buy ×${qty[tmpl.id]} (${GOLD_ICON}${total})`;
        btn.disabled = !buyable || total > gold;
      });
      // queue summary grouped by battalion
      const mine = save.pendingSpawns.filter((s) => s.owner === buyer);
      if (mine.length) {
        const counts = {};
        for (const s of mine) counts[s.templateId] = (counts[s.templateId] || 0) + 1;
        const names = Object.keys(counts).map((id) => `${(templateById(id) || {}).name || "?"} ×${counts[id]}`);
        queueEl.innerHTML = "Queued for deployment: <b>" + names.join(", ") + "</b> — deploy them on the board.";
      } else {
        queueEl.textContent = "";
      }
    }

    function step(id, delta) { qty[id] = Math.max(1, qty[id] + delta); refresh(); }
    function buy(id) {
      const tmpl = templateById(id); if (!tmpl) return;
      const s = statsOf(tmpl); if (!s.n || !s.ok) return;
      const n = qty[id], total = s.cost * n;
      if (save.economy[buyer] < total) return;
      save.economy[buyer] -= total;
      for (let i = 0; i < n; i++) save.pendingSpawns.push({ templateId: id, owner: buyer });
      SaveState.save(save);
      refresh();
    }

    function miniHtml(tmpl) {
      let s = "";
      for (let i = 0; i < 25; i++) {
        const t = (tmpl.cells || [])[i];
        s += t ? `<i style="background:${PLAYERS[buyer].color}"></i>` : `<i></i>`;
      }
      return `<div class="mini">${s}</div>`;
    }

    function build() {
      const list = save.templates[buyer];
      document.getElementById("noTemplates").style.display = list.length ? "none" : "";
      for (const tmpl of list) {
        const s = statsOf(tmpl);
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = tmpl.id;
        card.innerHTML =
          `<div class="top">${miniHtml(tmpl)}<div><h3>${tmpl.name}</h3>` +
            `<div class="stats"><span class="cost">${GOLD_ICON}${s.cost}</span> each · ${s.n}/25 battalions</div></div></div>` +
          `<div class="stats">❤️ HP <b>${s.hp}</b> &nbsp; ⚔️ ATK <b>${s.atk}</b> &nbsp; 👟 MOV <b>${s.mov}</b></div>` +
          `<div class="stepper">` +
            `<button class="dec10" type="button">−10</button>` +
            `<button class="dec" type="button">−1</button>` +
            `<span class="qty">1</span>` +
            `<button class="inc" type="button">+1</button>` +
            `<button class="inc10" type="button">+10</button>` +
          `</div>` +
          `<button class="buy" type="button">Buy</button>`;
        grid.appendChild(card);
        card.querySelector(".dec10").addEventListener("click", () => step(tmpl.id, -10));
        card.querySelector(".dec").addEventListener("click", () => step(tmpl.id, -1));
        card.querySelector(".inc").addEventListener("click", () => step(tmpl.id, +1));
        card.querySelector(".inc10").addEventListener("click", () => step(tmpl.id, +10));
        card.querySelector("button.buy").addEventListener("click", () => buy(tmpl.id));
      }
      refresh();
    }

    build();
  </script>
</body>
</html>
