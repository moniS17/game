<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Battlegrid — Choose mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1b2735 0%, #090a0f 100%); color: #e6e6e6;
    }
    .menu {
      background: #23282e; padding: 2.5rem 2rem; border-radius: 14px; width: 100%;
      max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,.5); text-align: center;
    }
    h1 { font-size: 1.8rem; margin-bottom: .3rem; }
    .sub { color: #9aa4ad; font-size: .85rem; margin-bottom: 1.8rem; }
    button {
      width: 100%; padding: 1rem; margin-bottom: .9rem; font-size: 1rem; font-weight: 600;
      color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: transform .1s, background .2s;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    button:hover { transform: translateY(-1px); }
    .pvp { background: #3a5bd9; } .pvp:hover { background: #2f49b0; }
    .pve { background: #b8412f; } .pve:hover { background: #9e3526; }
    .back { background: #444c55; } .back:hover { background: #525c66; }
    .hint { font-size: .72rem; color: #6b727a; margin-top: 1rem; }

    /* PvE difficulty picker */
    .diff h2 { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: #9aa4ad; margin-bottom: .6rem; }
    .diff .easy   { background: #2e8b57; } .diff .easy:hover   { background: #276b44; }
    .diff .normal { background: #4a7a9c; } .diff .normal:hover { background: #3d6885; }
    .diff .hard   { background: #b8412f; } .diff .hard:hover   { background: #9e3526; }
    .diff button small { font-weight: 500; opacity: .85; font-size: .72rem; }

    /* Board-size setup */
    .size { background: #1b2026; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; }
    .size h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: #9aa4ad; margin-bottom: .7rem; }
    .dims { display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .dims input {
      width: 5rem; padding: .55rem; font-size: 1rem; text-align: center; color: #e6e6e6;
      background: #0f1216; border: 1px solid #3a3f45; border-radius: 6px;
    }
    .dims input:focus { outline: none; border-color: #3a5bd9; }
    .dims span { color: #6b727a; font-weight: 700; }
    .dims label { font-size: .62rem; color: #6b727a; display: block; margin-bottom: .25rem; text-transform: uppercase; letter-spacing: .05em; }
    .field { display: flex; flex-direction: column; align-items: center; }
    .default {
      width: auto; margin: .8rem auto 0; padding: .45rem .9rem; font-size: .78rem; font-weight: 600;
      background: #2b3138; color: #cfd6dd;
    }
    .default:hover { background: #363d45; transform: none; }
    #sizeErr { color: #ff7a76; font-size: .7rem; min-height: .9rem; margin-top: .5rem; }
    .creative {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      font-size: .85rem; color: #cfd6dd; margin: 0 0 1rem; cursor: pointer;
    }
    .creative input { width: 1.05rem; height: 1.05rem; cursor: pointer; }

    /* Segmented Blue/Red pickers */
    .opt { margin-bottom: 1rem; text-align: left; }
    .opt h2 { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: #9aa4ad; margin-bottom: .45rem; }
    .opt .note { font-size: .62rem; color: #6b727a; margin-top: .3rem; }
    .seg { display: flex; gap: .5rem; }
    .seg button {
      flex: 1; margin: 0; padding: .6rem; font-size: .9rem; background: #1b2026;
      border: 1px solid #3a3f45; color: #9aa4ad;
    }
    .seg button:hover { transform: none; background: #232a31; }
    .seg button.on[data-v="0"] { background: #1e88e5; border-color: #1e88e5; color: #fff; }
    .seg button.on[data-v="1"] { background: #e53935; border-color: #e53935; color: #fff; }
  </style>
</head>
<body>
  <div class="menu">
    <h1>🗺️ New map</h1>
    <div class="sub">Set the board size, then pick your opponent to start.</div>

    <div class="size">
      <h2>Board size (tiles)</h2>
      <div class="dims">
        <div class="field">
          <label for="widthInput">Width</label>
          <input id="widthInput" type="number" inputmode="numeric" min="10" max="1717" step="1" value="100" />
        </div>
        <span>×</span>
        <div class="field">
          <label for="heightInput">Height</label>
          <input id="heightInput" type="number" inputmode="numeric" min="10" max="1717" step="1" value="100" />
        </div>
      </div>
      <button type="button" class="default" id="defaultBtn">↺ Default 100 × 100</button>
      <div id="sizeErr"></div>
    </div>

    <div class="opt">
      <h2>First move</h2>
      <div class="seg" id="firstSeg">
        <button type="button" data-v="0" class="on">🔵 Blue</button>
        <button type="button" data-v="1">🔴 Red</button>
      </div>
    </div>

    <div class="opt">
      <h2>You play (vs AI)</h2>
      <div class="seg" id="sideSeg">
        <button type="button" data-v="0" class="on">🔵 Blue</button>
        <button type="button" data-v="1">🔴 Red</button>
      </div>
      <div class="note">Only applies to Player vs AI — the AI takes the other side.</div>
    </div>

    <label class="creative"><input type="checkbox" id="creativeChk" /> 🎨 Creative mode</label>
    <div id="modeBtns">
      <button class="pvp" id="pvpBtn">🧑‍🤝‍🧑 Start — Player vs Player</button>
      <button class="pve" id="pveBtn">🤖 Start — Player vs AI</button>
      <button class="back" id="backBtn">← Back to menu</button>
    </div>

    <div class="diff" id="diffPanel" style="display:none;">
      <h2>Choose difficulty</h2>
      <button class="pve easy"   data-d="easy"><span>🟢 Easy<br><small>You earn +10% gold</small></span></button>
      <button class="pve normal" data-d="normal"><span>🟡 Normal<br><small>No bonuses — a fair fight</small></span></button>
      <button class="pve hard"   data-d="hard"><span>🔴 Hard<br><small>The AI earns +17% gold</small></span></button>
      <button class="back" id="diffBackBtn">← Change opponent</button>
    </div>

    <div class="hint" id="rangeHint">A fresh map is generated at the chosen size.</div>
  </div>

  <script src="algorithms.js"></script>
  <script src="state.js"></script>
  <script>
    const MIN = Algorithms.MIN, MAX = Algorithms.MAX;
    document.getElementById('rangeHint').textContent =
      `A fresh map is generated at the chosen size (${MIN}–${MAX} each side).`;
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const errEl = document.getElementById('sizeErr');

    // Read + validate a dimension input. Returns an integer in [MIN, MAX] or null.
    function readDim(el) {
      const n = Math.floor(Number(el.value));
      if (!Number.isFinite(n) || n < MIN || n > MAX) return null;
      return n;
    }

    document.getElementById('defaultBtn').addEventListener('click', () => {
      widthInput.value = String(Algorithms.GRID);
      heightInput.value = String(Algorithms.GRID);
      errEl.textContent = '';
    });

    // Segmented Blue/Red pickers: track the selected value, highlight the choice.
    function wireSeg(id) {
      const seg = document.getElementById(id);
      seg.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-v]');
        if (!btn) return;
        for (const b of seg.querySelectorAll('button')) b.classList.toggle('on', b === btn);
      });
      return () => Number(seg.querySelector('button.on').dataset.v);
    }
    const firstMove = wireSeg('firstSeg'); // which side moves first (both modes)
    const humanSide = wireSeg('sideSeg');  // which side the human plays (PvE only)

    // Start a new game: validate size, hand off to index.html which generates the map.
    // `difficulty` (easy|normal|hard) only applies to PvE and tunes gold income.
    function start(mode, difficulty) {
      const cols = readDim(widthInput), rows = readDim(heightInput);
      if (cols == null || rows == null) {
        errEl.textContent = `Enter whole numbers between ${MIN} and ${MAX} for both width and height.`;
        return false;
      }
      SaveState.setIntent({ action: 'new', mode, rows, cols,
        start: firstMove(), human: humanSide(),
        difficulty: difficulty || 'normal',
        creative: document.getElementById('creativeChk').checked });
      window.location.href = 'index.html';
      return true;
    }
    document.getElementById('pvpBtn').addEventListener('click', () => start('pvp'));
    // PvE: first validate the size, then reveal the difficulty picker.
    const modeBtns = document.getElementById('modeBtns');
    const diffPanel = document.getElementById('diffPanel');
    document.getElementById('pveBtn').addEventListener('click', () => {
      if (readDim(widthInput) == null || readDim(heightInput) == null) {
        errEl.textContent = `Enter whole numbers between ${MIN} and ${MAX} for both width and height.`;
        return;
      }
      errEl.textContent = '';
      modeBtns.style.display = 'none';
      diffPanel.style.display = '';
    });
    document.getElementById('diffBackBtn').addEventListener('click', () => {
      diffPanel.style.display = 'none';
      modeBtns.style.display = '';
    });
    for (const b of diffPanel.querySelectorAll('button[data-d]')) {
      b.addEventListener('click', () => start('pve', b.dataset.d));
    }
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = 'menu.html';
    });
  </script>
</body>
</html>
