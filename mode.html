<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Battlegrid — Choose mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1b2735 0%, #090a0f 100%); color: #e6e6e6;
    }
    .menu {
      background: #23282e; padding: 2.5rem 2rem; border-radius: 14px; width: 100%;
      max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,.5); text-align: center;
    }
    h1 { font-size: 1.8rem; margin-bottom: .3rem; }
    .sub { color: #9aa4ad; font-size: .85rem; margin-bottom: 1.8rem; }
    button {
      width: 100%; padding: 1rem; margin-bottom: .9rem; font-size: 1rem; font-weight: 600;
      color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: transform .1s, background .2s;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    button:hover { transform: translateY(-1px); }
    .pvp { background: #3a5bd9; } .pvp:hover { background: #2f49b0; }
    .pve { background: #b8412f; } .pve:hover { background: #9e3526; }
    .back { background: #444c55; } .back:hover { background: #525c66; }
    .hint { font-size: .72rem; color: #6b727a; margin-top: 1rem; }

    /* Board-size setup */
    .size { background: #1b2026; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; }
    .size h2 { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: #9aa4ad; margin-bottom: .7rem; }
    .dims { display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .dims input {
      width: 5rem; padding: .55rem; font-size: 1rem; text-align: center; color: #e6e6e6;
      background: #0f1216; border: 1px solid #3a3f45; border-radius: 6px;
    }
    .dims input:focus { outline: none; border-color: #3a5bd9; }
    .dims span { color: #6b727a; font-weight: 700; }
    .dims label { font-size: .62rem; color: #6b727a; display: block; margin-bottom: .25rem; text-transform: uppercase; letter-spacing: .05em; }
    .field { display: flex; flex-direction: column; align-items: center; }
    .default {
      width: auto; margin: .8rem auto 0; padding: .45rem .9rem; font-size: .78rem; font-weight: 600;
      background: #2b3138; color: #cfd6dd;
    }
    .default:hover { background: #363d45; transform: none; }
    #sizeErr { color: #ff7a76; font-size: .7rem; min-height: .9rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <div class="menu">
    <h1>🗺️ New map</h1>
    <div class="sub">Set the board size, then pick your opponent to start.</div>

    <div class="size">
      <h2>Board size (tiles)</h2>
      <div class="dims">
        <div class="field">
          <label for="widthInput">Width</label>
          <input id="widthInput" type="number" inputmode="numeric" min="5" max="400" step="1" value="100" />
        </div>
        <span>×</span>
        <div class="field">
          <label for="heightInput">Height</label>
          <input id="heightInput" type="number" inputmode="numeric" min="5" max="400" step="1" value="100" />
        </div>
      </div>
      <button type="button" class="default" id="defaultBtn">↺ Default 100 × 100</button>
      <div id="sizeErr"></div>
    </div>

    <button class="pvp" id="pvpBtn">🧑‍🤝‍🧑 Start — Player vs Player</button>
    <button class="pve" id="pveBtn">🤖 Start — Player vs AI</button>
    <button class="back" id="backBtn">← Back to menu</button>

    <div class="hint">A fresh map is generated at the chosen size (5–400 each side).</div>
  </div>

  <script src="algorithms.js"></script>
  <script src="state.js"></script>
  <script>
    const MIN = Algorithms.MIN, MAX = Algorithms.MAX;
    const widthInput = document.getElementById('widthInput');
    const heightInput = document.getElementById('heightInput');
    const errEl = document.getElementById('sizeErr');

    // Read + validate a dimension input. Returns an integer in [MIN, MAX] or null.
    function readDim(el) {
      const n = Math.floor(Number(el.value));
      if (!Number.isFinite(n) || n < MIN || n > MAX) return null;
      return n;
    }

    document.getElementById('defaultBtn').addEventListener('click', () => {
      widthInput.value = String(Algorithms.GRID);
      heightInput.value = String(Algorithms.GRID);
      errEl.textContent = '';
    });

    // Start a new game: validate size, hand off to index.html which generates the map.
    function start(mode) {
      const cols = readDim(widthInput), rows = readDim(heightInput);
      if (cols == null || rows == null) {
        errEl.textContent = `Enter whole numbers between ${MIN} and ${MAX} for both width and height.`;
        return;
      }
      SaveState.setIntent({ action: 'new', mode, rows, cols });
      window.location.href = 'index.html';
    }
    document.getElementById('pvpBtn').addEventListener('click', () => start('pvp'));
    document.getElementById('pveBtn').addEventListener('click', () => start('pve'));
    document.getElementById('backBtn').addEventListener('click', () => {
      window.location.href = 'menu.html';
    });
  </script>
</body>
</html>
