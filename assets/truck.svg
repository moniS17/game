<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Motorized: side-view military truck (cargo bed + cab), facing right -->
  <!-- cargo bed / canopy (rear, left) -->
  <rect x="5" y="24" width="31" height="22" rx="2" fill="#4b5320"/>
  <rect x="5" y="24" width="31" height="5" rx="2" fill="#3a4019"/>
  <!-- cab (front, right) -->
  <path d="M36 46 V33 h9 l6 7 v6 z" fill="#5a6428"/>
  <!-- windshield -->
  <path d="M38.5 39 V35 h5.5 l3.5 4 z" fill="#a7d8e6"/>
  <!-- headlight -->
  <circle cx="50" cy="43" r="1.6" fill="#ffe082"/>
  <!-- chassis bar -->
  <rect x="5" y="46" width="47" height="3" fill="#2e2e2e"/>
  <!-- wheels -->
  <circle cx="16" cy="50" r="6" fill="#212121"/>
  <circle cx="16" cy="50" r="2.4" fill="#6d6d6d"/>
  <circle cx="43" cy="50" r="6" fill="#212121"/>
  <circle cx="43" cy="50" r="2.4" fill="#6d6d6d"/>
</svg>
