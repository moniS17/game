<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00b894" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity=".3"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#e17055"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="url(#grid)" stroke-width="2" fill="none" opacity=".5">
    <line x1="128" y1="80" x2="128" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="384" y1="80" x2="384" y2="432"/>
    <line x1="80" y1="160" x2="432" y2="160"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="80" y1="352" x2="432" y2="352"/>
  </g>
  <!-- Shield / crest shape -->
  <path d="M256 120 L340 170 L340 290 Q340 370 256 410 Q172 370 172 290 L172 170 Z"
        fill="url(#shield)" opacity=".9"/>
  <!-- Sword cross -->
  <g stroke="#2d3436" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="175" x2="256" y2="360"/>
    <line x1="220" y1="220" x2="292" y2="220"/>
  </g>
  <!-- Sword pommel -->
  <circle cx="256" cy="170" r="10" fill="#2d3436"/>
  <!-- BG text -->
  <text x="256" y="470" text-anchor="middle" font-family="sans-serif" font-weight="700"
        font-size="48" fill="#dfe6e9" letter-spacing="6">BATTLEGRID</text>
</svg>
