<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Battlegrid — Turn-Based Strategy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; height: 100vh; background: #1b1f23; color: #e6e6e6;
    }
    #boardWrap { flex: 1; position: relative; min-width: 0; }
    #board { display: block; width: 100%; height: 100%; cursor: grab; background: #0d0f11; touch-action: none; }
    #board:active { cursor: grabbing; }

    /* Top-of-page overlay: the units standing on the tapped tile, each figure with HP above it. */
    #tileList {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      max-height: 45%; overflow-y: auto;
      background: rgba(21,24,28,0.93); border-bottom: 1px solid #3a3f45;
      padding: 8px 12px; display: none; flex-direction: column; gap: 6px;
      -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    }
    #tileList .tl-head {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
      color: #9aa4ad; text-align: center;
    }
    /* Overlapping cascade: strongest unit on top, each one to the right tucked half-under the one on its left. */
    #tileList .tl-figs { display: flex; flex-direction: row; justify-content: center; flex-wrap: wrap; padding-top: 2px; }
    .tunit { position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .tunit:not(:first-child) { margin-left: -18px; }
    .thp { font-size: .72rem; font-weight: 700; line-height: 1; margin-top: 1px; }
    .tfig {
      width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: #fff; font-weight: 700; font-family: monospace; font-size: 1.2rem;
      border: 2px solid rgba(0,0,0,0.35); box-shadow: 0 -2px 5px rgba(0,0,0,0.45);
    }
    .tfig img { width: 72%; height: 72%; }

    #sidebar {
      width: 290px; flex-shrink: 0; padding: 16px 16px 8px; overflow-y: auto;
      background: #23282e; border-left: 1px solid #333; display: flex; flex-direction: column; gap: 14px;
    }

    /* Phone / narrow screens: stack the board on top, sidebar below. */
    @media (max-width: 760px) {
      body { flex-direction: column; }
      #boardWrap { flex: none; height: 56vh; }
      #sidebar { width: 100%; border-left: none; border-top: 1px solid #333; }
    }
    h1 { font-size: 1.15rem; }
    h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #9aa4ad; margin-bottom: 6px; }
    .panel { background: #2b3138; border-radius: 8px; padding: 12px; }

    #turnBadge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-weight: 600; color: #fff; }
    /* turn header: round on the left, a compact gold read-out tucked to the right */
    .turn-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .econ-mini {
      display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0;
      font-size: 1rem; font-weight: 800; color: #f5c542;
    }
    .econ-mini img { width: 1.1em; height: 1.1em; }
    button {
      width: 100%; padding: 9px; font-size: .9rem; font-weight: 600; color: #fff;
      background: #3a5bd9; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px;
    }
    button:hover { background: #2f49b0; }
    button.shop { background: #2e7d46; } button.shop:hover { background: #266b3b; }
    button.ghost { background: #444c55; } button.ghost:hover { background: #525c66; }
    /* header row: a panel title with a control (e.g. button) tucked to its right */
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .panel-head h2 { margin: 0; }
    button.small { width: auto; margin: 0; padding: 5px 9px; font-size: .72rem; white-space: nowrap; }
    button.small:disabled { background: #333a41; color: #6b727a; cursor: not-allowed; }

    .stat-row { display: flex; justify-content: space-between; font-size: .85rem; padding: 2px 0; }
    .muted { color: #9aa4ad; }
    .hint { font-size: .75rem; color: #7e8893; }

    /* Enemy-move pop-up (combat log) */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; padding: 20px;
      background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
      -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
    }
    .modal-box {
      background: #23282e; border: 1px solid #3a3f45; border-radius: 10px; padding: 18px;
      width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    #logModalBody { font-size: .84rem; line-height: 1.5; margin: 10px 0; }
    #logModalBody div { padding: 3px 0; border-bottom: 1px solid #333; }
    #logModalBody .empty { color: #9aa4ad; }

    /* Unit-template pop-up: a 5×5 preview of the tapped unit's subunits + stats. */
    #unitModalBody { font-size: .86rem; line-height: 1.5; margin: 10px 0; }
    .utmpl-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px;
      width: 190px; margin: 10px auto; padding: 6px;
      background: #15181c; border: 1px solid #3a3f45; border-radius: 8px;
    }
    .utmpl-grid i {
      aspect-ratio: 1; border-radius: 4px; background: #23282e;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: monospace; font-weight: 700; font-size: .8rem;
    }
    .utmpl-grid i img { width: 78%; height: 78%; }
    .utmpl-stats { display: flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center; }
    .utmpl-comp { color: #9aa4ad; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="tileList"></div>
  <div id="boardWrap"><canvas id="board"></canvas></div>

  <aside id="sidebar">
    <div class="panel">
      <div class="panel-head">
        <h2>Selection</h2>
        <button id="nextMovBtn" class="ghost small" title="Jump to the next of your units that can still move">Next MOV</button>
      </div>
      <label style="display:flex; align-items:center; gap:8px; font-size:.82rem; margin-bottom:8px; cursor:pointer;">
        <input type="checkbox" id="selectAllChk" checked style="width:auto; margin:0;" />
        Select whole stack
      </label>
      <div id="selInfo" class="muted">Click a tile to select its units.</div>
    </div>

    <div class="panel">
      <h2>Turn</h2>
      <div class="turn-line">
        <span>Now playing: <span id="turnBadge">—</span> &nbsp; <span class="muted">Round <span id="roundNum">1</span></span></span>
        <!-- compact economy read-out for the current player, tucked to the right of the round -->
        <span class="econ-mini"><img src="assets/gold.svg" alt="gold"> <span id="econ">0</span></span>
      </div>

      <!-- creative-mode cheat: only shown when the game was started in creative mode -->
      <button id="creativeBtn" style="display:none; background:#8e5bd9;">🎁 +171,717 gold</button>

      <div class="stat-row"><span>Blue units</span><span id="blueCount">0</span></div>
      <div class="stat-row"><span>Red units</span><span id="redCount">0</span></div>
      <div class="stat-row"><span>Cities (Blue / Red)</span><span id="cityCount">0 / 0</span></div>
      <div class="stat-row"><span>Villages (Blue / Red)</span><span id="villageCount">0 / 0</span></div>

      <button class="shop" id="buyBtn">🛒 Buy subunits</button>
      <button id="templateBtn">▦ Templates</button>
      <button id="techBtn">🔬 Tech &amp; upgrades</button>
      <button id="nextRoundBtn">Next round ▶</button>
      <button class="ghost" id="infoBtn">📖 Field manual</button>
      <button class="ghost" id="menuBtn">Main menu</button>
    </div>

    <div class="panel" id="placePanel" style="display:none; border:1px solid #b8a23a;">
      <h2>Deploy units</h2>
      <div id="placeInfo"></div>
    </div>

    <div class="panel">
      <label style="display:flex; align-items:center; gap:8px; font-size:.85rem; cursor:pointer;">
        <input type="checkbox" id="logChk" checked style="width:auto; margin:0;" />
        Combat log
      </label>
      <p class="hint" style="margin-top:6px">When checked, the enemy's move is shown as a pop-up after each turn.</p>
    </div>
  </aside>

  <!-- Pop-up shown after the enemy's turn (combat log). Closed with OK. -->
  <div id="logModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 style="color:#e6e6e6; font-size:1rem; margin-bottom:0;">Enemy's move</h2>
      <div id="logModalBody"></div>
      <button id="logModalOk">OK</button>
    </div>
  </div>

  <!-- Pop-up shown when a unit in the top overlay is tapped: its template blueprint. -->
  <div id="unitModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h2 id="unitModalTitle" style="color:#e6e6e6; font-size:1rem; margin-bottom:0;">Unit</h2>
      <div id="unitModalBody"></div>
      <button id="unitModalOk">Close</button>
    </div>
  </div>

  <!-- data + algorithms + rules + persistence + renderer load before the engine -->
  <script src="units.js"></script>
  <script src="algorithms.js"></script>
  <script src="board.js"></script>
  <script src="rules.js"></script>
  <script src="state.js"></script>
  <script src="render.js"></script>
  <script>
    // UI glue. Defined before game.js; every handler reads the DOM at call time.
    function stackAtTile(t) { return (Game.unitAt.get(t.r + ',' + t.c)) || []; }

    function stackSummaryHtml(stack, owner) {
      // Group units by their template name (each board piece is a unit).
      const counts = {};
      for (const u of stack) { const n = u.name || PIECES[u.type].name; counts[n] = (counts[n] || 0) + 1; }
      const lines = Object.keys(counts).map((n) =>
        `<div class="stat-row"><span>${n}</span><span>×${counts[n]}</span></div>`).join('');
      const totHp = stack.reduce((a, u) => a + u.hp, 0);
      const totAtk = stack.reduce((a, u) => a + Rules.unitAttack(u), 0);
      return `<div class="stat-row"><span><b>${PLAYERS[owner].name} — ${stack.length} unit${stack.length > 1 ? 's' : ''}</b></span><span>${stack.length}/${Rules.STACK_LIMIT}</span></div>` +
        lines +
        `<div class="stat-row"><span>Total HP / ATK</span><span>${totHp} / ${totAtk}</span></div>` +
        (owner === Game.turn
          ? `<p class="hint" style="margin-top:6px">Whole stack selected. Tap a yellow tile to move, or an adjacent enemy to attack.</p>`
          : `<p class="hint" style="margin-top:6px">Enemy units.</p>`);
    }

    function stackChecklistHtml(stack) {
      const selIds = new Set(Game.selUnits.map((u) => u.id));
      const rows = stack.map((u) => {
        const label = u.name || PIECES[u.type].name;
        const checked = selIds.has(u.id) ? 'checked' : '';
        return `<label class="stat-row" style="cursor:pointer">` +
          `<span><input type="checkbox" data-uid="${u.id}" ${checked} style="width:auto; margin-right:6px;"> ${label}</span>` +
          `<span>${u.hp}/${u.maxHp} hp${u.acted ? ' ·acted' : ''}</span></label>`;
      }).join('');
      return `<div class="stat-row"><span><b>Pick units</b></span><span>${Game.selUnits.length}/${stack.length}</span></div>` +
        rows +
        `<p class="hint" style="margin-top:6px">Checked units move/attack together. Tap a yellow tile to move, or an adjacent enemy to attack.</p>`;
    }

    // HP colour: green when healthy, amber when hurt, red when near death.
    function hpColor(u) {
      const r = u.hp / u.maxHp;
      return r > 0.66 ? '#4caf50' : r > 0.33 ? '#f5c542' : '#ff5a52';
    }

    // Overall strength of a unit — attack dominates, current HP breaks ties.
    function unitStat(u) { return Rules.unitAttack(u) * 100 + u.hp; }

    // Top overlay: units on the tapped tile, strongest first, each figure half-covering the next.
    function renderTileList() {
      const box = document.getElementById('tileList');
      const stack = Game.selTile ? stackAtTile(Game.selTile) : [];
      if (!stack.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
      const owner = stack[0].owner;
      const sorted = stack.slice().sort((a, b) => unitStat(b) - unitStat(a));
      const figs = sorted.map((u, i) => {
        const d = PIECES[u.type];
        const color = PLAYERS[u.owner].color;
        const inner = d.art
          ? `<img src="${d.art}" alt="${d.name}">`
          : d.code;
        return `<div class="tunit" data-i="${i}" title="${d.name} — tap for template" style="z-index:${sorted.length - i}">` +
          `<div class="tfig" style="background:${color}">${inner}</div>` +
          `<div class="thp" style="color:${hpColor(u)}">${u.hp}/${u.maxHp}</div></div>`;
      }).join('');
      box.innerHTML =
        `<div class="tl-head">${PLAYERS[owner].name} · ${stack.length} unit${stack.length > 1 ? 's' : ''} on tile</div>` +
        `<div class="tl-figs">${figs}</div>`;
      box.style.display = 'flex';
      // Tapping a figure opens its unit's template blueprint in a pop-up.
      box.querySelectorAll('.tunit').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          showUnitTemplate(sorted[+el.dataset.i]);
        });
      });
    }

    // Pop-up: show `u`'s blueprint — a 5×5 grid of its subunits plus totals.
    // Built from the unit's own parts composition, so it works for shop-built
    // units and the AI's ad-hoc units alike (no dependency on a stored template).
    function showUnitTemplate(u) {
      if (!u) return;
      const color = PLAYERS[u.owner].color;
      // Flatten the parts composition into up to 25 cells.
      const cells = [];
      for (const p of (u.parts || [])) for (let i = 0; i < p.count; i++) cells.push(p.type);
      let grid = '';
      for (let i = 0; i < 25; i++) {
        const t = cells[i];
        const inner = t ? (PIECES[t].art ? `<img src="${PIECES[t].art}" alt="${PIECES[t].name}">` : PIECES[t].code) : '';
        grid += t ? `<i style="background:${color}">${inner}</i>` : `<i></i>`;
      }
      const atk = Rules.unitAttack(u);
      let cost = 0;
      for (const p of (u.parts || [])) cost += (PIECES[p.type].cost || 0) * p.count;
      const comp = (u.parts || []).map((p) => `${PIECES[p.type].name} ×${p.count}`).join(' · ');
      document.getElementById('unitModalTitle').innerHTML =
        `<span style="color:${color}">${PLAYERS[u.owner].name}</span> — ${u.name || PIECES[u.type].name}`;
      document.getElementById('unitModalBody').innerHTML =
        `<div class="utmpl-grid">${grid}</div>` +
        `<div class="utmpl-stats">` +
          `<span>❤️ HP <b>${u.hp}/${u.maxHp}</b></span>` +
          `<span>⚔️ ATK <b>${atk}</b></span>` +
          `<span>👟 MOV <b>${u.mov}</b></span>` +
          `<span>${GOLD_ICON} <b>${cost}</b></span>` +
        `</div>` +
        `<div class="utmpl-comp">${comp || 'No subunits'}</div>`;
      document.getElementById('unitModal').style.display = 'flex';
    }

    const UI = {
      refresh() {
        const p = PLAYERS[Game.turn];
        const badge = document.getElementById('turnBadge');
        badge.textContent = p.name;
        badge.style.background = p.color;
        document.getElementById('roundNum').textContent = Game.round;

        // economy sign reflects the player whose turn it is
        const econ = document.getElementById('econ');
        econ.textContent = Game.economy[Game.turn];
        econ.parentElement.style.color = p.color === '#1e88e5' ? '#5aa9ff' : '#ff7a76';

        // creative-mode cheat button (only when the game is in creative mode)
        document.getElementById('creativeBtn').style.display = Game.creative ? '' : 'none';

        let blue = 0, red = 0;
        for (const u of Game.units) (u.owner === 0 ? blue++ : red++, 0);
        document.getElementById('blueCount').textContent = blue;
        document.getElementById('redCount').textContent = red;
        let cb = 0, cr = 0;
        for (const c of Game.cities) { if (c.owner === 0) cb++; else if (c.owner === 1) cr++; }
        document.getElementById('cityCount').textContent = cb + ' / ' + cr;
        let vb = 0, vr = 0;
        for (const v of (Game.villages || [])) { if (v.owner === 0) vb++; else if (v.owner === 1) vr++; }
        document.getElementById('villageCount').textContent = vb + ' / ' + vr;

        // placement banner
        const placePanel = document.getElementById('placePanel');
        if (window.inPlacement && window.inPlacement()) {
          placePanel.style.display = '';
          document.getElementById('placeInfo').innerHTML =
            `<b style="color:${p.color}">${p.name}</b>: ${window.pendingForTurn()} unit(s) to deploy.` +
            `<p class="hint" style="margin-top:6px">Tap a highlighted tile in your deployment zone to drop them (max 17 per tile).</p>`;
        } else {
          placePanel.style.display = 'none';
        }

        // selection panel
        const sel = document.getElementById('selInfo');
        if (Game.winner !== null) {
          sel.className = '';
          sel.innerHTML = `<b style="color:${PLAYERS[Game.winner].color}">${PLAYERS[Game.winner].name} wins!</b>`;
        } else if (Game.selTile && stackAtTile(Game.selTile).length) {
          const stack = stackAtTile(Game.selTile);
          const owner = stack[0].owner;
          const mine = owner === Game.turn;
          sel.className = '';
          if (Game.selectAll || !mine) {
            sel.innerHTML = stackSummaryHtml(stack, owner);
          } else {
            sel.innerHTML = stackChecklistHtml(stack);
            sel.querySelectorAll('input[data-uid]').forEach((cb) =>
              cb.addEventListener('change', () => window.toggleUnitInSelection(+cb.dataset.uid)));
          }
        } else {
          sel.className = 'muted';
          sel.textContent = 'Click a tile to select its units.';
        }

        // "Next MOV" button: enabled only when the current player still has a
        // unit with movement left (and the game is live).
        const nextMovBtn = document.getElementById('nextMovBtn');
        if (nextMovBtn) {
          const anyMoves = Game.winner === null &&
            Game.units.some((u) => u.owner === Game.turn && u.movesLeft > 0);
          nextMovBtn.disabled = !anyMoves;
        }

        renderTileList();
      },
      log(msg) {
        // Combat log entries are buffered; the enemy's turn is shown as a
        // pop-up (see showEnemyMoves) rather than an always-on panel.
        this.entries.push(msg);
        if (this.entries.length > 200) this.entries.shift();
      },
      entries: [],
      // Show `lines` (the enemy's actions this turn) in a pop-up, if the
      // Combat log checkbox is on and there is anything to report.
      showEnemyMoves(lines) {
        const chk = document.getElementById('logChk');
        if (!chk || !chk.checked || !lines.length) return;
        const body = document.getElementById('logModalBody');
        body.innerHTML = lines.map((m) => `<div>${m}</div>`).join('');
        document.getElementById('logModal').style.display = 'flex';
      },
    };

    // Unit stats and the terrain/unit legend now live in the Field Manual
    // (info.html) to keep the board sidebar focused on play.

    document.getElementById('nextRoundBtn').addEventListener('click', () => nextRound());
    document.getElementById('buyBtn').addEventListener('click', () => { window.location.href = 'buy.html'; });
    document.getElementById('templateBtn').addEventListener('click', () => { window.location.href = 'template.html'; });
    document.getElementById('techBtn').addEventListener('click', () => { window.location.href = 'tech.html'; });
    document.getElementById('infoBtn').addEventListener('click', () => { window.location.href = 'info.html'; });
    document.getElementById('menuBtn').addEventListener('click', () => { window.location.href = 'menu.html'; });
    document.getElementById('creativeBtn').addEventListener('click', () => window.creativeGrant());
    document.getElementById('selectAllChk').addEventListener('change', (e) => window.setSelectAll(e.target.checked));
    document.getElementById('nextMovBtn').addEventListener('click', () => window.selectNextWithMoves && window.selectNextWithMoves());

    // Combat-log pop-up: OK closes it; the checkbox preference is remembered.
    document.getElementById('logModalOk').addEventListener('click', () => {
      document.getElementById('logModal').style.display = 'none';
    });
    // Unit-template pop-up: Close, or tap the backdrop, to dismiss.
    document.getElementById('unitModalOk').addEventListener('click', () => {
      document.getElementById('unitModal').style.display = 'none';
    });
    document.getElementById('unitModal').addEventListener('click', (e) => {
      if (e.target.id === 'unitModal') e.currentTarget.style.display = 'none';
    });
    (function () {
      const chk = document.getElementById('logChk');
      const saved = localStorage.getItem('battlegrid.logPopup');
      if (saved !== null) chk.checked = saved === '1';
      chk.addEventListener('change', () => localStorage.setItem('battlegrid.logPopup', chk.checked ? '1' : '0'));
    })();
  </script>
  <script src="game.js"></script>
</body>
</html>
