<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #333;
    }

    .login-card {
      background: #fff;
      width: 100%;
      max-width: 360px;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .login-card h1 {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: #667eea;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #5568d3; }

    .message {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 1rem;
    }

    .message.error { color: #d93025; }
    .message.success { color: #188038; }

    .lang-btn {
      position: fixed; top: 16px; right: 16px;
      padding: 6px 14px; font-size: .85rem; font-weight: 600;
      background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3);
      border-radius: 6px; cursor: pointer; backdrop-filter: blur(6px);
      transition: background .2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>
  <button class="lang-btn" id="langBtn">中文</button>
  <form class="login-card" id="loginForm" novalidate>
    <h1>Sign in</h1>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
    </div>

    <button type="submit">Log in</button>

    <p class="message" id="message"></p>
  </form>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = form.username.value.trim();
      const password = form.password.value;

      if (!username || !password) {
        const t = i18n[getLang()] || i18n.en;
        message.textContent = t.both;
        message.className = "message error";
        return;
      }

      // Validate against the credentials in users.txt (see auth.js).
      const t = i18n[getLang()] || i18n.en;
      message.textContent = t.checking;
      message.className = "message";
      let ok = false;
      try {
        ok = await Auth.check(username, password);
      } catch (err) {
        message.textContent = err.message + " — are you opening this over http://, not file://?";
        message.className = "message error";
        return;
      }

      if (!ok) {
        const t2 = i18n[getLang()] || i18n.en;
        message.textContent = t2.incorrect;
        message.className = "message error";
        return;
      }

      const t3 = i18n[getLang()] || i18n.en;
      message.textContent = t3.signing + username + "...";
      message.className = "message success";

      // Remember who's playing, then go to the main menu.
      try { localStorage.setItem("battlegrid.user", username); } catch (e) {}
      setTimeout(function () { window.location.href = "menu.html"; }, 400);
    });

    // Language toggle
    const i18n = {
      en: {
        title: 'Sign in',
        username: 'Username',
        password: 'Password',
        submit: 'Log in',
        both: 'Please enter both username and password.',
        checking: 'Checking…',
        incorrect: 'Incorrect username or password.',
        signing: 'Signing in as ',
        langLabel: '中文',
      },
      zh: {
        title: '登录',
        username: '用户名',
        password: '密码',
        submit: '登录',
        both: '请输入用户名和密码。',
        checking: '验证中…',
        incorrect: '用户名或密码错误。',
        signing: '正在登录 ',
        langLabel: 'EN',
      }
    };
    function getLang() { return localStorage.getItem('battlegrid.lang') || 'en'; }
    function setLang(lang) {
      localStorage.setItem('battlegrid.lang', lang);
      applyLang(lang);
    }
    function applyLang(lang) {
      const t = i18n[lang] || i18n.en;
      document.querySelector('.login-card h1').textContent = t.title;
      document.querySelector('label[for="username"]').textContent = t.username;
      document.querySelector('label[for="password"]').textContent = t.password;
      document.querySelector('button[type="submit"]').textContent = t.submit;
      document.getElementById('langBtn').textContent = t.langLabel;
    }
    document.getElementById('langBtn').addEventListener('click', () => {
      setLang(getLang() === 'en' ? 'zh' : 'en');
    });
    applyLang(getLang());
  </script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
</body>
</html>
