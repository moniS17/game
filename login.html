<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1b1f23" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-card {
      background: #fff;
      width: 100%;
      max-width: 360px;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .login-card h1 {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: #667eea;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #5568d3; }

    .message {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 1rem;
    }

    .message.error { color: #d93025; }
    .message.success { color: #188038; }
  </style>
</head>
<body>
  <form class="login-card" id="loginForm" novalidate>
    <h1>Sign in</h1>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
    </div>

    <button type="submit">Log in</button>

    <p class="message" id="message"></p>
  </form>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = form.username.value.trim();
      const password = form.password.value;

      if (!username || !password) {
        message.textContent = "Please enter both username and password.";
        message.className = "message error";
        return;
      }

      // Validate against the credentials in users.txt (see auth.js).
      message.textContent = "Checking…";
      message.className = "message";
      let ok = false;
      try {
        ok = await Auth.check(username, password);
      } catch (err) {
        message.textContent = err.message + " — are you opening this over http://, not file://?";
        message.className = "message error";
        return;
      }

      if (!ok) {
        message.textContent = "Incorrect username or password.";
        message.className = "message error";
        return;
      }

      message.textContent = "Signing in as " + username + "...";
      message.className = "message success";

      // Remember who's playing, then go to the main menu.
      try { localStorage.setItem("battlegrid.user", username); } catch (e) {}
      setTimeout(function () { window.location.href = "menu.html"; }, 400);
    });
  </script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
</body>
</html>
